<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Soham Travel</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #07152b; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #0d1f35; padding: 3rem; border-radius: 16px; width: 100%; max-width: 420px; margin: 20px; }
    .brand { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: #fff; margin-bottom: 2rem; text-align: center; }
    .brand span { color: #c9a84c; }
    h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; margin-bottom: .5rem; }
    p { font-size: 13px; color: #8fa8c2; margin-bottom: 1.5rem; }
    label { display: block; font-size: 12px; letter-spacing: .09em; text-transform: uppercase; color: #8fa8c2; margin-bottom: 7px; }
    input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); border-radius: 10px; color: #fff; font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; margin-bottom: 1.2rem; }
    input:focus { border-color: #c9a84c; }
    button { width: 100%; padding: 14px; background: linear-gradient(135deg, #c9a84c, #9a7120); border: none; border-radius: 10px; color: #1a0f00; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; display: none; }
    .error { background: rgba(226,75,74,.12); border: 1px solid rgba(226,75,74,.3); color: #f09595; }
    .success { background: rgba(46,160,67,.12); border: 1px solid rgba(46,160,67,.3); color: #7ee89a; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">Soham <span>Travel</span></div>
  <h2>Reset Password</h2>
  <p>Enter your new password below</p>
  <div class="msg error" id="errorMsg"></div>
  <div class="msg success" id="successMsg"></div>
  <label>New Password</label>
  <input type="password" id="newPassword" placeholder="Min. 6 characters"/>
  <label>Confirm Password</label>
  <input type="password" id="confirmPassword" placeholder="Repeat password"/>
  <button onclick="resetPassword()">Reset Password</button>
</div>

<script>
async function resetPassword() {
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (!newPassword || !confirmPassword) {
    showMsg('error', 'Please fill in all fields!');
    return;
  }
  if (newPassword !== confirmPassword) {
    showMsg('error', 'Passwords do not match!');
    return;
  }
  if (newPassword.length < 6) {
    showMsg('error', 'Password must be at least 6 characters!');
    return;
  }

  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const email = params.get('email');

  try {
    const response = await fetch('https://sohamtravel-backend-production.up.railway.app/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, token, newPassword })
    });

    const data = await response.json();

    if (response.ok) {
      showMsg('success', 'Password reset! Redirecting to login...');
      setTimeout(() => window.location.href = 'login.html', 2000);
    } else {
      showMsg('error', data.message);
    }
  } catch (err) {
    showMsg('error', 'Cannot connect to server!');
  }
}

function showMsg(type, msg) {
  const el = document.getElementById(type + 'Msg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
